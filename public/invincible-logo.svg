<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 190" aria-label="Invincible Logo">
  <!-- INVINCIBLE text — textLength fix karta hai ki text hamesha poora fit ho, kabhi cut na ho -->
  <text x="8" y="118"
        font-family="Arial Black, Impact, Helvetica, sans-serif"
        font-weight="900" font-size="92" fill="#1a1a1a"
        letter-spacing="-2" textLength="470" lengthAdjust="spacingAndGlyphs">INVINCIBLE</text>

  <!-- Bull horns mark (crescent wings + head — original logo se match) -->
  <g transform="translate(496, 26) scale(0.55)" fill="#1a1a1a">
    <path d="M 116 58 C 78 46 42 26 8 6 C 38 34 72 58 104 70 C 113 72 118 65 116 58 Z"/>
    <path d="M 124 58 C 162 46 198 26 232 6 C 202 34 168 58 136 70 C 127 72 122 65 124 58 Z"/>
    <path d="M 102 62 L 112 67 L 120 64 L 128 67 L 138 62 L 120 112 Z"/>
  </g>

  <!-- Saffron (orange) bar — left -->
  <rect x="8" y="146" width="252" height="14" fill="#f57c00"/>
  <!-- Green bar — right -->
  <rect x="380" y="146" width="252" height="14" fill="#2e7d32"/>
</svg>
